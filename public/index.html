<!DOCTYPE html>
<!-- VERSION: 1.1 - Fixed play button loading issue & added version tracking -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gats.io Clone - Firebase Multiplayer</title>
    <style>
        /* Modern Reset & Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #222; overflow: hidden; color: white; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #2b2b2b; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .hud-element { position: absolute; background: rgba(0, 0, 0, 0.5); padding: 10px 20px; border-radius: 4px; pointer-events: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #ammo-display { bottom: 20px; right: 20px; font-size: 24px; color: #fff; }
        #health-bar-container { bottom: 20px; left: 50%; transform: translateX(-50%); width: 300px; height: 10px; background: #444; border-radius: 5px; overflow: hidden; position: absolute; }
        #health-fill { height: 100%; width: 100%; background: #2ecc71; transition: width 0.1s; }
        #dash-bar-container { bottom: 35px; left: 50%; transform: translateX(-50%); width: 200px; height: 4px; background: #444; border-radius: 2px; overflow: hidden; position: absolute; display: none; }
        #dash-fill { height: 100%; width: 100%; background: #3498db; }
        #ability-icon { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: rgba(0,0,0,0.6); border-radius: 4px; display: none; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        #reload-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: #f1c40f; font-size: 14px; font-weight: bold; display: none; }
        #score-display { top: 20px; left: 20px; font-size: 20px; color: white; }
        #connection-status { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-size: 12px; color: #aaa; display: none; }
 
        .menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; z-index: 10; }
        .hidden { display: none !important; }
        h1 { font-size: 3rem; margin-bottom: 15px; color: white; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        .panel { background: #333; padding: 20px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; max-width: 700px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        input[type="text"] { width: 100%; padding: 8px; background: #444; border: 1px solid #555; color: white; border-radius: 4px; font-size: 16px; }
        .selection-grid { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .select-btn { background: #444; border: 2px solid #555; color: #ddd; padding: 8px 12px; cursor: pointer; border-radius: 4px; transition: all 0.2s; min-width: 70px; font-size: 14px; }
        .select-btn:hover { background: #555; }
        .select-btn.active { border-color: #3498db; background: #2c3e50; color: white; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        .play-btn { background: #27ae60; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; width: 100%; margin-top: 5px; }
        .play-btn:hover { background: #2ecc71; }
        .play-btn.secondary { background: #2980b9; margin-top: 10px; }
        .play-btn.secondary:hover { background: #3498db; }
 
        #level-up-screen { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: rgba(20, 20, 20, 0.95); padding: 15px 25px; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.8); border: 2px solid #444; text-align: center; pointer-events: auto; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        #level-up-screen h1 { font-size: 18px; margin: 0 0 10px 0; color: #f1c40f; text-transform: uppercase; }
        #perk-cards-container { display: flex; gap: 10px; justify-content: center; }
        .perk-card { background: #333; padding: 12px; width: 110px; border-radius: 6px; cursor: pointer; border: 2px solid #444; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80px; }
        .perk-card:hover { background: #444; border-color: #3498db; transform: translateY(-5px); }
        .perk-title { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .perk-desc { font-size: 10px; color: #aaa; line-height: 1.2; }
 
        #leaderboard { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 4px; text-align: right; pointer-events: none; min-width: 150px; }
        .lb-entry { font-size: 14px; margin-bottom: 2px; }
        #lobby-ui { margin-top: 20px; padding-top: 20px; border-top: 1px solid #555; }
        #server-role-badge { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 4px 14px; border-radius: 20px; font-size: 11px; color: #f39c12; display: none; pointer-events: none; }
        #firebase-config-warning { background: #c0392b; color: white; padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; display: none; }
    </style>
</head>
<body>
 
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
 
    <div id="ui-layer">
        <div id="leaderboard"></div>
        <div id="score-display" class="hud-element">Score: 0</div>
        <div id="reload-msg">RELOADING...</div>
        <div id="connection-status">Connecting...</div>
        <div id="server-role-badge">⚙️ YOU ARE THE SERVER</div>
        <div id="ability-icon">E</div>
        <div id="dash-bar-container"><div id="dash-fill"></div></div>
        <div id="health-bar-container" class="hud-element"><div id="health-fill"></div></div>
        <div id="ammo-display" class="hud-element">20 / 20</div>
    </div>
 
    <div id="start-screen" class="menu-screen">
        <div id="version-display" style="position: absolute; top: 10px; right: 10px; font-size: 11px; color: #666;"></div>
        <h1>GATS.CLONE</h1>
        <div class="panel">
            <div id="firebase-config-warning" style="display:none">⚠️ Firebase not configured. Edit FIREBASE_CONFIG at the top of the script.</div>
            <div id="player-count-display" style="margin-bottom:12px; color:#aaa; font-size:13px;">🌐 Public Server — checking players...</div>
            <div class="input-group"><label>Nickname</label><input type="text" id="nickname" placeholder="Enter name" value="Player"></div>
            <div class="input-group"><label>Weapon</label><div class="selection-grid" id="weapon-select"></div></div>
            <div class="input-group"><label>Armor</label><div class="selection-grid" id="armor-select"></div></div>
            <div class="input-group"><label>Color</label>
                <div class="selection-grid" id="color-select">
                    <div class="color-btn active" style="background: #e74c3c" data-color="#e74c3c"></div>
                    <div class="color-btn" style="background: #3498db" data-color="#3498db"></div>
                    <div class="color-btn" style="background: #9b59b6" data-color="#9b59b6"></div>
                    <div class="color-btn" style="background: #f1c40f" data-color="#f1c40f"></div>
                    <div class="color-btn" style="background: #2ecc71" data-color="#2ecc71"></div>
                    <div class="color-btn" style="background: #ffffff" data-color="#ffffff"></div>
                </div>
            </div>
            <button class="play-btn" id="btn-play">PLAY</button>
        </div>
    </div>
 
    <div id="level-up-screen" class="hidden"><h1>LEVEL UP</h1><div id="perk-cards-container"></div></div>
    <div id="death-screen" class="menu-screen hidden">
        <h1>YOU DIED</h1>
        <div class="panel">
            <p style="margin-bottom: 20px; font-size: 18px;">Killed by <span id="killer-name" style="color: #e74c3c; font-weight: bold;">Bot</span></p>
            <p style="margin-bottom: 30px;">Final Score: <span id="final-score">0</span></p>
            <div class="input-group"><label>Weapon</label><div class="selection-grid" id="respawn-weapon-select"></div></div>
            <div class="input-group"><label>Armor</label><div class="selection-grid" id="respawn-armor-select"></div></div>
            <button class="play-btn" id="respawn-btn">RESPAWN</button>
        </div>
    </div>
 
    <script type="module">
        // ═══════════════════════════════════════════════════════════════════
        // VERSION TRACKING
        // ═══════════════════════════════════════════════════════════════════
        const APP_VERSION = "1.1";
        console.log(`%c🎮 GATS.io Clone v${APP_VERSION}`, "color: #2ecc71; font-weight: bold; font-size: 14px;");
        document.getElementById('version-display').innerText = `v${APP_VERSION}`;

        // ✅ This tells the browser exactly where to download the code
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, off, push, remove, onDisconnect, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        
        // ═══════════════════════════════════════════════════════════════════
        // FIREBASE CONFIGURATION — paste your project config here
        // ═══════════════════════════════════════════════════════════════════
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyCjr0dG-YwjdHjBpVMcTB_bzCgFM9qdtqo",
            authDomain: "gats-f9cb0.firebaseapp.com",
            databaseURL: "https://gats-f9cb0-default-rtdb.asia-southeast1.firebasedatabase.app", // <-- Add this line
            projectId: "gats-f9cb0",
            storageBucket: "gats-f9cb0.firebasestorage.app",
            messagingSenderId: "1029432978708",
            appId: "1:1029432978708:web:7310373c4038b714e1a601"
        };
        // ═══════════════════════════════════════════════════════════════════
 

        let db = null;
        let firebaseReady = false;
        try {
            if (FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
                const app = initializeApp(FIREBASE_CONFIG);
                db = getDatabase(app);
                firebaseReady = true;
                console.log("✅ Firebase ready");
            } else {
                document.getElementById('firebase-config-warning').style.display = 'block';
            }
        } catch(e) {
            console.error("❌ Firebase init failed:", e);
            document.getElementById('firebase-config-warning').style.display = 'block';
        }
 
        // ─── Public server constants ──────────────────────────────────────
        const PUBLIC_ROOM = 'PUBLIC';   // single persistent room everyone shares
        const SERVER_TIMEOUT = 8000;   // ms — if server heartbeat is this old, claim it
 
        // ─── Firebase paths ───────────────────────────────────────────────
        const fbServer      = () => ref(db, `${PUBLIC_ROOM}/server`);
        const fbState       = () => ref(db, `${PUBLIC_ROOM}/state`);
        const fbMap         = () => ref(db, `${PUBLIC_ROOM}/map`);
        const fbPlayers     = () => ref(db, `${PUBLIC_ROOM}/players`);
        const fbPlayerEntry = (id) => ref(db, `${PUBLIC_ROOM}/players/${id}`);
        const fbInput       = (id) => ref(db, `${PUBLIC_ROOM}/inputs/${id}`);
 
        // ─── Net state ────────────────────────────────────────────────────
        let myId        = null;   // this tab's player id
        let isServer    = false;  // true if this tab is running the authoritative game loop
        let netPlayers  = {};     // id → Character (server-side live objects)
        let inputFlushInterval  = null;
        let heartbeatInterval   = null;
        let serverWatchInterval = null;
 
        const CANVAS = document.getElementById('gameCanvas');
        const CTX = CANVAS.getContext('2d');
        const TILE_SIZE = 50; 
        const WORLD_WIDTH = 2500;
        const WORLD_HEIGHT = 2500;
        
        const WEAPONS = {
            pistol: { name: 'Pistol', range: 500, damage: 15, fireRate: 400, spread: 0.02, recoil: 0.05, kick: 0.2, weight: 0, ammo: 12, reload: 1200, auto: false, length: 25, width: 8 },
            smg:    { name: 'SMG',    range: 400, damage: 9,  fireRate: 90, spread: 0.10, recoil: 0.03, kick: 0.05, weight: 5, ammo: 30, reload: 1800, auto: true, length: 20, width: 6 },
            shotgun:{ name: 'Shotgun',range: 350, damage: 8,  fireRate: 900, spread: 0.20, recoil: 0.25, kick: 1.5, weight: 10, ammo: 5,  reload: 2200, auto: false, length: 35, width: 10, count: 6 },
            assault:{ name: 'Assault',range: 650, damage: 13, fireRate: 140, spread: 0.04, recoil: 0.04, kick: 0.15, weight: 10, ammo: 30, reload: 2000, auto: true, length: 40, width: 8 },
            sniper: { name: 'Sniper', range: 1100,damage: 65, fireRate: 1400,spread: 0.0,  recoil: 0.40, kick: 2.0, weight: 20, ammo: 5,  reload: 2800, auto: false, length: 65, width: 6 },
            lmg:    { name: 'LMG',    range: 650, damage: 11, fireRate: 110, spread: 0.12, recoil: 0.04, kick: 0.1, weight: 30, ammo: 60, reload: 3500, auto: true, length: 45, width: 12 }
        };
 
        const ARMOR = {
            none:   { name: 'No Armor', weight: 0, bonusHp: 0 },
            light:  { name: 'Light',    weight: 15, bonusHp: 30 },
            medium: { name: 'Medium',   weight: 30, bonusHp: 60 },
            heavy:  { name: 'Heavy',    weight: 50, bonusHp: 90 }
        };
 
        const PERKS_LIST = {
            speed:  { name: 'Speed', desc: '+Movement Speed' },
            kevlar: { name: 'Kevlar', desc: '-50% Incoming Damage' },
            dash:   { name: 'Dash', desc: 'Space to Dash' },
            camo:   { name: 'Camo', desc: 'Invisible when still' },
            knife:  { name: 'Knife', desc: 'Press E to Throw Knife' }
        };
 
        let gameState = {
            running: false,
            mode: 'client',   // 'server' | 'client'
            paused: false,
            lastTime: 0,
            camera: { x: 0, y: 0 },
            cameraLocked: false,
            mouse: { x: 0, y: 0, down: false },
            keys: { w: false, a: false, s: false, d: false, r: false, space: false, e: false },
            player: null, 
            playerId: null, 
            entities: [],
            bullets: [],
            particles: [],
            projectiles: [],
            obstacles: [],
            decorations: [], 
            score: 0,
            renderData: null,
            perkThresholds: [100, 300, 600],
            nextThresholdIndex: 0,
            pendingRespawn: null, // <-- ADD THIS
            pendingPerk: null
        };
 
 
 
        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { return new Vector(this.x + v.x, this.y + v.y); }
            sub(v) { return new Vector(this.x - v.x, this.y - v.y); }
            mult(n) { return new Vector(this.x * n, this.y * n); }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() {
                let m = this.mag();
                return m === 0 ? new Vector(0,0) : new Vector(this.x / m, this.y / m);
            }
        }
 
        class Entity {
            constructor(x, y, radius, color) {
                this.pos = new Vector(x, y); this.vel = new Vector(0, 0); this.accel = new Vector(0, 0);
                this.radius = radius; this.color = color; this.angle = 0; this.dead = false;
                this.maxHealth = 100; this.health = 100; this.regenTimer = 0; this.score = 0;
            }
            update(dt) {
                if (this.health < this.maxHealth && this.health > 0) {
                    this.regenTimer += dt;
                    if (this.regenTimer > 4000) { this.health = Math.min(this.maxHealth, this.health + (8 * dt / 1000)); }
                }
            }
            takeDamage(amount, source) {
                this.regenTimer = 0; this.health -= amount;
                if (source && !source.dead) { source.score += amount; if (source === gameState.player && isServer) gameState.score = source.score; }
                if (this.health <= 0) { this.health = 0; this.die(source); }
                for(let i=0; i<3; i++) gameState.particles.push(new Particle(this.pos.x, this.pos.y, '#fff', 3));
            }
            die(killer) {
                this.dead = true;
                this._deadAt = Date.now(); // <-- ADD THIS LINE
                this.killer = killer ? killer.id : null;
                if (killer && !killer.dead) { killer.score += 100; if (killer === gameState.player && isServer) gameState.score = killer.score; }
                for(let i=0; i<12; i++) gameState.particles.push(new Particle(this.pos.x, this.pos.y, this.color, 10));
            }
            resolvePhysics(dt) {
                this.pos.x = Math.max(this.radius, Math.min(WORLD_WIDTH-this.radius, this.pos.x));
                this.pos.y = Math.max(this.radius, Math.min(WORLD_HEIGHT-this.radius, this.pos.y));
                gameState.obstacles.forEach(obs => {
                    let closestX = Math.max(obs.x, Math.min(this.pos.x, obs.x + obs.w));
                    let closestY = Math.max(obs.y, Math.min(this.pos.y, obs.y + obs.h));
                    let dx = this.pos.x - closestX; let dy = this.pos.y - closestY; let distSq = dx*dx + dy*dy;
                    if (distSq < (this.radius * this.radius)) {
                        let dist = Math.sqrt(distSq); let overlap = this.radius - dist;
                        if (dist > 0) {
                            let nx = dx / dist; let ny = dy / dist;
                            this.pos.x += nx * overlap; this.pos.y += ny * overlap;
                            this.vel.x *= 0.9; this.vel.y *= 0.9;
                        }
                    }
                });
            }
        }
 
        class Character extends Entity {
            constructor(name, x, y, weaponKey, armorKey, color, isBot = false, id = null) {
                super(x, y, 22, color);
                this.id = id || Math.random().toString(36).substr(2, 9);
                this.name = name; this.weaponKey = weaponKey; this.weapon = WEAPONS[weaponKey]; this.armorKey = armorKey;
                this.armor = ARMOR[armorKey]; this.perks = []; 
                this.maxHealth = 100 + this.armor.bonusHp; this.health = this.maxHealth; this.currentAmmo = this.weapon.ammo;
                this.isReloading = false; this.reloadTimer = 0; this.shootTimer = 0; this.isBot = isBot;
                
                let baseSpeed = 0.65;
                let totalWeight = this.weapon.weight + this.armor.weight;
                let speedFactor = Math.max(0.5, 1.0 - (totalWeight / 150)); 
                this.maxSpeedBase = baseSpeed * speedFactor;
                this.acceleration = 0.025; this.recoilSpread = 0; this.dashCooldown = 0; this.knifeCooldown = 0; this.graceTimer = 5000;
 
                this.moveInput = new Vector(0,0); this.wantShoot = false; this.lastWantShoot = false; this.wantReload = false; this.wantDash = false; this.wantKnife = false;
                this.target = null; this.changeDirTimer = 0; this.reactionTimer = 0;
            }
            hasPerk(name) { return this.perks.includes(name); }
            getMaxSpeed() { let s = this.maxSpeedBase; if (this.hasPerk('speed')) s *= 1.2; return s; }
            takeDamage(amount, source) {
                if (this.graceTimer > 0) return;
                if (this.hasPerk('kevlar')) amount *= 0.5;
                super.takeDamage(amount, source);
            }
            die(killer) {
                super.die(killer);
                if (this === gameState.player) {
                    // Set default respawn selections to current loadout
                    respawnWeapon = this.weaponKey || 'pistol';
                    respawnArmor = this.armorKey || 'none';
                    
                    setTimeout(() => {
                        document.getElementById('death-screen').classList.remove('hidden');
                        document.getElementById('killer-name').innerText = killer ? killer.name : "Environment";
                        document.getElementById('final-score').innerText = Math.floor(gameState.score);
                        
                        // Set active states for respawn selectors
                        document.querySelectorAll('#respawn-weapon-select .select-btn').forEach(b => {
                            b.classList.remove('active');
                            if (b.dataset.key === respawnWeapon) b.classList.add('active');
                        });
                        document.querySelectorAll('#respawn-armor-select .select-btn').forEach(b => {
                            b.classList.remove('active');
                            if (b.dataset.key === respawnArmor) b.classList.add('active');
                        });
                    }, 1000);
                }
            }
            update(dt) {
                super.update(dt);
                if (this.graceTimer > 0) this.graceTimer -= dt;
                this.recoilSpread = Math.max(0, this.recoilSpread - (0.0008 * dt));
                if (this.isReloading) { this.reloadTimer -= dt; if (this.reloadTimer <= 0) { this.isReloading = false; this.currentAmmo = this.weapon.ammo; } }
                if (this.shootTimer > 0) this.shootTimer -= dt;
                if (this.dashCooldown > 0) this.dashCooldown -= dt;
                if (this.knifeCooldown > 0) this.knifeCooldown -= dt;
                
                if (this.wantDash) { this.performDash(); this.wantDash = false; }
                if (this.wantKnife) { this.throwKnife(); this.wantKnife = false; }
                if (this.wantReload) { this.reload(); this.wantReload = false; }
                
                // Handle shooting for network players (auto vs semi-auto)
                if (this.wantShoot) {
                    if (this.weapon.auto) {
                        // Auto weapon: shoot continuously while wantShoot is true
                        this.shoot(0, 0); // Parameters not used, shoots in this.angle direction
                    } else {
                        // Semi-auto: only shoot once per trigger pull
                        if (!this.lastWantShoot) {
                            this.shoot(0, 0);
                        }
                    }
                }
                this.lastWantShoot = this.wantShoot;
                
                this.applyPhysics(dt);
            }
            applyPhysics(dt) {
                if (this.moveInput.mag() > 0) this.vel = this.vel.add(this.moveInput.mult(this.acceleration * dt));
                let friction = this.moveInput.mag() > 0 ? 0.92 : 0.82;
                this.vel = this.vel.mult(friction);
                let limit = this.getMaxSpeed() * dt;
                if (this.isReloading || this.shootTimer > 0) limit *= 0.7;
                if (this.vel.mag() > limit && this.dashCooldown < 2500) this.vel = this.vel.normalize().mult(limit);
                this.pos = this.pos.add(this.vel);
                this.resolvePhysics(dt);
            }
            performDash() {
                if (!this.hasPerk('dash') || this.dashCooldown > 0) return;
                let dashDir = this.moveInput.mag() > 0 ? this.moveInput.normalize() : new Vector(Math.cos(this.angle), Math.sin(this.angle));
                this.vel = this.vel.add(dashDir.mult(25)); this.dashCooldown = 3000;
                for(let i=0; i<10; i++) gameState.particles.push(new Particle(this.pos.x, this.pos.y, '#3498db', 5));
            }
            throwKnife() {
                if (!this.hasPerk('knife') || this.knifeCooldown > 0) return;
                let dir = new Vector(Math.cos(this.angle), Math.sin(this.angle));
                gameState.projectiles.push(new KnifeProjectile(this.pos.x + dir.x * 30, this.pos.y + dir.y * 30, dir, this));
                this.knifeCooldown = 2000;
            }
            shoot(targetX, targetY) {
                if (this.isReloading || this.shootTimer > 0) return;
                if (this.currentAmmo <= 0) { this.reload(); return; }
                this.currentAmmo--; this.shootTimer = this.weapon.fireRate;
                this.recoilSpread += this.weapon.recoil; if (this.recoilSpread > 0.5) this.recoilSpread = 0.5;
                let dir = new Vector(Math.cos(this.angle), Math.sin(this.angle));
                this.vel = this.vel.sub(dir.mult(this.weapon.kick));
                let count = this.weapon.count || 1;
                let gunLen = this.radius + this.weapon.length;
                let gunTipX = this.pos.x + Math.cos(this.angle) * gunLen;
                let gunTipY = this.pos.y + Math.sin(this.angle) * gunLen;
                let speedPenalty = (this.vel.mag() / 20) * 0.2; 
                for(let i=0; i<count; i++) {
                    let spreadAngle = (Math.random() - 0.5) * (this.weapon.spread + this.recoilSpread + speedPenalty);
                    let finalAngle = this.angle + spreadAngle;
                    let vel = new Vector(Math.cos(finalAngle), Math.sin(finalAngle));
                    gameState.bullets.push(new Bullet(gunTipX, gunTipY, vel, this.weapon.range, this.weapon.damage, this));
                }
            }
            reload() { if (this.isReloading || this.currentAmmo === this.weapon.ammo) return; this.isReloading = true; this.reloadTimer = this.weapon.reload; }
            serialize() {
                return {
                    id: this.id, x: this.pos.x, y: this.pos.y, a: this.angle,
                    n: this.name, c: this.color, hp: this.health, mhp: this.maxHealth,
                    w: this.weaponKey, ar: this.armorKey, dead: this.dead, 
                    killer: this.killer || null,  // <-- Add "|| null" here
                    sc: this.score, perks: this.perks || [], // <-- Add "|| []" here
                    rl: this.isReloading, camo: this.hasPerk('camo') && this.vel.mag() < 0.2,
                    kc: this.knifeCooldown, dc: this.dashCooldown,
                    inv: this.graceTimer > 0, currentAmmo: this.currentAmmo
                };
            }
        }
 
        class KnifeProjectile {
            constructor(x, y, dir, owner) { this.pos = new Vector(x, y); this.dir = dir; this.speed = 0.6; this.owner = owner; this.dead = false; this.rot = 0; }
            update(dt) {
                this.pos.x += this.dir.x * this.speed * dt; this.pos.y += this.dir.y * this.speed * dt; this.rot += 0.3;
                gameState.obstacles.forEach(obs => { if(this.pos.x>obs.x && this.pos.x<obs.x+obs.w && this.pos.y>obs.y && this.pos.y<obs.y+obs.h) this.dead=true; });
                if(this.pos.x<0||this.pos.x>WORLD_WIDTH||this.pos.y<0||this.pos.y>WORLD_HEIGHT) this.dead=true;
                if(!this.dead && isServer) {
                    let targets = gameState.entities.concat(gameState.player);
                    for(let t of targets) {
                        if(t===this.owner || t.dead) continue;
                        if(this.pos.sub(t.pos).mag() < t.radius+10) { this.dead=true; t.takeDamage(999, this.owner); }
                    }
                }
            }
            serialize() { return { x: this.pos.x, y: this.pos.y, r: this.rot }; }
        }
 
        class Bullet {
            constructor(x, y, dir, range, damage, owner) { this.pos = new Vector(x, y); this.dir = dir; this.speed = 1.4; this.range = range; this.damage = damage; this.owner = owner; this.dead = false; this.distTraveled = 0; }
            update(dt) {
                let move = this.speed*dt; this.pos.x+=this.dir.x*move; this.pos.y+=this.dir.y*move; this.distTraveled+=move;
                if(this.distTraveled>=this.range) { this.dead=true; gameState.particles.push(new Particle(this.pos.x, this.pos.y, '#aaa', 2)); }
                for(let o of gameState.obstacles) { if(this.pos.x>=o.x && this.pos.x<=o.x+o.w && this.pos.y>=o.y && this.pos.y<=o.y+o.h) { this.dead=true; gameState.particles.push(new Particle(this.pos.x, this.pos.y, '#aaa', 3)); return; } }
                if(isServer) {
                    let targets = gameState.entities.concat(gameState.player);
                    for(let t of targets) {
                        if(t===this.owner||t.dead) continue;
                        if(this.pos.sub(t.pos).mag()<t.radius) { this.dead=true; t.takeDamage(this.damage, this.owner); return; }
                    }
                }
            }
            serialize() { return { x: this.pos.x, y: this.pos.y }; }
        }
 
        class Particle {
            constructor(x, y, color, size) {
                this.pos = new Vector(x, y); let angle = Math.random()*Math.PI*2; let speed = Math.random()*0.15;
                this.vel = new Vector(Math.cos(angle)*speed, Math.sin(angle)*speed); this.life = 1.0; this.color = color; this.size = size;
            }
            update(dt) { this.pos = this.pos.add(this.vel.mult(dt)); this.life -= dt/400; }
            serialize() { return { x: this.pos.x, y: this.pos.y, c: this.color, s: this.size, l: this.life }; }
        }
 
        function drawCharacter(ctx, d) {
            let isCamo = d.camo;
            if (isCamo) {
                ctx.save(); ctx.beginPath(); ctx.arc(d.x, d.y, 22, 0, Math.PI*2); ctx.clip();
                ctx.strokeStyle='#555'; ctx.lineWidth=2; let offX = Math.sin(Date.now()/200)*10;
                ctx.beginPath(); for(let x=d.x-22; x<d.x+22; x+=10) { ctx.moveTo(x+offX, d.y-22); ctx.lineTo(x+offX, d.y+22); }
                ctx.stroke(); ctx.restore(); ctx.globalAlpha=0.1;
            }
            if (d.inv) {
                ctx.save(); ctx.translate(d.x, d.y);
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 150) * 0.3;
                ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI * 2); ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.stroke();
                ctx.restore(); if (!isCamo) ctx.globalAlpha = 1.0;
            }
            ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.a);
            let w = WEAPONS[d.w];
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(13, -w.width/2, w.length, w.width);
            ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fillStyle = d.c; ctx.fill();
            ctx.beginPath(); ctx.arc(17, 8, 6, 0, Math.PI*2); ctx.arc(17, -8, 6, 0, Math.PI*2); ctx.fillStyle = d.c; ctx.fill();
            ctx.lineWidth = 4;
            if (d.ar === 'light') ctx.strokeStyle='#bdc3c7'; else if (d.ar === 'medium') ctx.strokeStyle='#7f8c8d';
            else if (d.ar === 'heavy') ctx.strokeStyle='#2c3e50'; else ctx.strokeStyle='rgba(0,0,0,0.1)';
            ctx.stroke();
            if (d.rl) { ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.fillText("R", -3, 3); }
            ctx.restore(); ctx.globalAlpha=1.0;
            if (!d.dead && !isCamo) {
                ctx.save(); ctx.translate(d.x, d.y - 40);
                ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.fillText(d.n, 0, 0);
                ctx.fillStyle = '#444'; ctx.fillRect(-20, 5, 40, 5);
                ctx.fillStyle = d.hp > 50 ? '#2ecc71' : '#e74c3c'; ctx.fillRect(-20, 5, 40 * (d.hp / d.mhp), 5);
                ctx.restore();
            }
        }

        // ─── Server claim / heartbeat ──────────────────────────────────────
        async function tryClaimServer() {
            // Check if there's a live server (heartbeat < SERVER_TIMEOUT ms ago)
            const snap = await get(fbServer());
            if (snap.exists()) {
                const s = snap.val();
                if (s.heartbeat && Date.now() - s.heartbeat < SERVER_TIMEOUT) {
                    console.log("⚠️ Server already exists, will join as client");
                    return false; // server is alive, we're a client
                }
            }
            // Either no server or stale — try to claim
            console.log("🤝 Attempting to claim server...");
            await set(fbServer(), { owner: myId, heartbeat: Date.now() });
            // Small race window: re-read to confirm we won
            const confirm = await get(fbServer());
            const claimed = confirm.exists() && confirm.val().owner === myId;
            console.log(claimed ? "✅ Server claimed!" : "❌ Server claim lost race condition");
            return claimed;
        }
 
        async function becomeServer() {
            isServer = true;
            gameState.mode = 'server';
            console.log("⚙️ Promoted to SERVER - running authoritative game loop");
            document.getElementById('server-role-badge').style.display = 'block';

            // Load or generate map
            const mapSnap = await get(fbMap());
            if (mapSnap.exists()) {
                const m = mapSnap.val();
                gameState.obstacles   = m.obstacles   || [];
                gameState.decorations = m.decorations || [];
                console.log(`✅ Loaded existing map: ${gameState.obstacles.length} obstacles`);
            } else {
                generateMap();
                await set(fbMap(), { obstacles: gameState.obstacles, decorations: gameState.decorations });
                console.log(`✅ Generated new map: ${gameState.obstacles.length} obstacles`);
            }

            // Listen for other players joining
            onValue(fbPlayers(), snap => {
                if (!snap.exists()) return;
                snap.forEach(child => {
                    const cd = child.val();
                    if (!cd || cd.id === myId || netPlayers[cd.id]) return;
                    const spawn = findSafeSpawn();
                    const p = new Character(cd.name, spawn.x, spawn.y, cd.w, cd.a, cd.c, false, cd.id);
                    gameState.entities.push(p);
                    netPlayers[cd.id] = p;
                    console.log(`👤 Player joined: ${cd.name} (${cd.id})`);
                });
                // Remove players who left
                if (snap.val()) {
                    const activeIds = Object.keys(snap.val());
                    Object.keys(netPlayers).forEach(id => {
                        if (!activeIds.includes(id)) {
                            gameState.entities = gameState.entities.filter(e => e.id !== id);
                            delete netPlayers[id];
                            console.log(`👤 Player left: ${id}`);
                        }
                    });
                }
            });

            // Listen for inputs
            onValue(ref(db, `${PUBLIC_ROOM}/inputs`), snap => {
                if (!snap.exists()) return;
                snap.forEach(child => {
                    const inp = child.val();
                    if (!inp || inp.id === myId) return;

                    const p = netPlayers[inp.id];
                    if (!p) return;

                    if (inp.keys.w) p.moveInput.y = -1; else if (inp.keys.s) p.moveInput.y = 1; else p.moveInput.y = 0;
                    if (inp.keys.a) p.moveInput.x = -1; else if (inp.keys.d) p.moveInput.x = 1; else p.moveInput.x = 0;
                    if (p.moveInput.mag() > 0) p.moveInput = p.moveInput.normalize();
                    p.angle     = inp.angle;
                    p.wantShoot = inp.mouse;
                    if (inp.keys.space) p.wantDash   = true;
                    if (inp.keys.e)     p.wantKnife  = true;
                    if (inp.keys.r)     p.wantReload = true;
                    if (inp.perkChoice) { p.perks.push(inp.perkChoice); }
                    if (inp.respawn) {
                        const spawn = findSafeSpawn();
                        const newP = new Character(p.name, spawn.x, spawn.y,
                            inp.respawn.weapon || p.weaponKey,
                            inp.respawn.armor  || p.armorKey,
                            p.color, false, inp.id);
                        gameState.entities = gameState.entities.filter(e => e.id !== inp.id);
                        gameState.entities.push(newP);
                        netPlayers[inp.id] = newP;
                    }
                });
            });

            // Heartbeat so other tabs know the server is alive
            heartbeatInterval = setInterval(() => {
                if (!isServer) return;
                set(fbServer(), { owner: myId, heartbeat: Date.now() });
            }, 3000);
        }
 
        async function becomeClient() {
            isServer = false;
            gameState.mode = 'client';
            console.log("👥 Setting up as CLIENT - waiting for server state updates...");

            // Await map load so obstacles exist before anything spawns
            const mapSnap = await get(fbMap());
            if (mapSnap.exists()) {
                const m = mapSnap.val();
                gameState.obstacles   = m.obstacles   || [];
                gameState.decorations = m.decorations || [];
                console.log(`✅ Map loaded: ${gameState.obstacles.length} obstacles`);
            }
            gameState.renderData = {
                entities: [], bullets: [], particles: [], projectiles: [],
                obstacles: gameState.obstacles, decorations: gameState.decorations
            };

            // Listen for server state — seed renderData first frame, then lerp via targetData
            onValue(fbState(), snap => {
                if (!snap.exists()) {
                    console.log("⏳ Waiting for state from server...");
                    return;
                }
                const data = snap.val();
                if (!data.entities) {
                    console.log("⚠️ State received but no entities");
                    return;
                }
                console.log(`📡 State received: ${data.entities.length} entities`);
                gameState.targetData = data;
                // First frame: seed renderData with real positions so lerp doesn't start at 0,0
                if (gameState.renderData.entities.length === 0) {
                    gameState.renderData.entities    = data.entities.map(e => ({...e}));
                    gameState.renderData.bullets     = data.bullets     || [];
                    gameState.renderData.projectiles = data.projectiles || [];
                    gameState.renderData.particles   = data.particles   || [];
                    console.log(`✅ Seeded renderData with ${data.entities.length} entities`);
                }
                const me = data.entities.find(e => e.id === myId);
                if (me) {
                    console.log(`✅ Found self in state: ${me.n || 'unknown'}`);
                    gameState.player = me;
                    gameState.score  = me.sc;
                } else {
                    console.warn(`⚠️ Self (${myId}) not found in entities list`);
                }
                const wasDead = gameState.player ? gameState.player.dead : false;
                if (me && me.dead && !wasDead) showDeathScreen(me, data.entities);
            });

            // Watch for server going away — promote ourselves if stale
            serverWatchInterval = setInterval(async () => {
                const snap = await get(fbServer());
                if (!snap.exists() || Date.now() - (snap.val().heartbeat || 0) > SERVER_TIMEOUT) {
                    clearInterval(serverWatchInterval); serverWatchInterval = null;
                    console.log('⚠️ Server gone — promoting to server');
                    await promoteToServer();
                }
            }, 5000);

            // Push input at 20Hz
            if (inputFlushInterval) clearInterval(inputFlushInterval);
            inputFlushInterval = setInterval(() => {
                if (!gameState.running || isServer) return;
                const p = gameState.player;
                if (!p) return;
                const screenX = (p.x - gameState.camera.x) + (CANVAS.width / 2);
                const screenY = (p.y - gameState.camera.y) + (CANVAS.height / 2);
                const angle = Math.atan2(gameState.mouse.y - screenY, gameState.mouse.x - screenX);
                let payload = {
                    id: myId,
                    keys:  { w: gameState.keys.w, a: gameState.keys.a, s: gameState.keys.s, d: gameState.keys.d,
                             space: gameState.keys.space, e: gameState.keys.e, r: gameState.keys.r },
                    mouse: gameState.mouse.down, angle, ts: Date.now()
                };
                if (gameState.pendingRespawn) { payload.respawn   = gameState.pendingRespawn; gameState.pendingRespawn = null; }
                if (gameState.pendingPerk)    { payload.perkChoice = gameState.pendingPerk;   gameState.pendingPerk    = null; }
                set(fbInput(myId), payload);
                gameState.keys.space = false; gameState.keys.e = false; gameState.keys.r = false;
            }, 50);
        }

         async function promoteToServer() {
            // Re-claim the server role from within the game
            await set(fbServer(), { owner: myId, heartbeat: Date.now() });
            const confirm = await get(fbServer());
            if (!confirm.exists() || confirm.val().owner !== myId) return; // someone else got it
 
            // Convert my render data entities back into live Character objects
            const oldEntities = gameState.entities.slice();
            gameState.entities = [];
            netPlayers = {};
 
            // Re-add all known players from Firebase
            const pSnap = await get(fbPlayers());
            if (pSnap.exists()) {
                pSnap.forEach(child => {
                    const cd = child.val();
                    if (!cd) return;
                    const spawn = findSafeSpawn();
                    const p = new Character(cd.name, spawn.x, spawn.y, cd.w, cd.a, cd.c, false, cd.id);
                    if (cd.id === myId) {
                        gameState.player = p;
                        gameState.playerId = myId;
                    } else {
                        gameState.entities.push(p);
                        netPlayers[cd.id] = p;
                    }
                });
            }
 
            if (inputFlushInterval) { clearInterval(inputFlushInterval); inputFlushInterval = null; }
            await becomeServer();
            gameState.mode = 'server';
            isServer = true;
            document.getElementById('server-role-badge').style.display = 'block';
            console.log('Promoted to server');
        }
 
        async function joinPublicServer(name, weapon, armor, color) {
            if (!firebaseReady) { alert("Firebase not configured!"); return; }

            myId = 'p_' + Math.random().toString(36).substr(2, 9);
            gameState.playerId = myId;
            console.log(`📍 Generated player ID: ${myId}`);

            document.getElementById('connection-status').style.display = 'block';
            document.getElementById('connection-status').innerText = 'Connecting...';

            try {
                // Register in players list
                const playerEntry = fbPlayerEntry(myId);
                await set(playerEntry, { id: myId, name, w: weapon, a: armor, c: color, joined: Date.now() });
                onDisconnect(playerEntry).remove();
                onDisconnect(fbInput(myId)).remove();
                console.log("✅ Player registered in database");

                // Try to claim the server role
                const claimed = await tryClaimServer();
                console.log(claimed ? "⚙️ Server claimed" : "👥 Joined as client");

                if (claimed) {
                    // We are the server — also create our player Character locally
                    const spawn = findSafeSpawn(); // may be empty until map loads, fixed in becomeServer
                    gameState.player = null; // will be set after map loads in becomeServer
                    await becomeServer();
                    // Now map is loaded, spawn ourselves
                    const sp = findSafeSpawn();
                    gameState.player = new Character(name, sp.x, sp.y, weapon, armor, color, false, myId);
                    gameState.playerId = myId;
                } else {
                    await becomeClient();
                    // Player object will arrive via state updates; prime camera
                    gameState.player = null;
                }

                document.getElementById('connection-status').innerText = claimed ? '⚙️ Running as server' : 'Connected!';
                setTimeout(() => document.getElementById('connection-status').style.display = 'none', 2000);
                startGameSession();
                console.log("✅ Game session initialized and started");
            } catch (error) {
                console.error("❌ Error in joinPublicServer:", error);
                document.getElementById('connection-status').innerText = 'Connection failed!';
                throw error;
            }
        }

        function generateMap() {
            gameState.obstacles = [];
            gameState.obstacles.push({x: -50, y: -50, w: WORLD_WIDTH + 100, h: 50}); 
            gameState.obstacles.push({x: -50, y: WORLD_HEIGHT, w: WORLD_WIDTH + 100, h: 50}); 
            gameState.obstacles.push({x: -50, y: 0, w: 50, h: WORLD_HEIGHT}); 
            gameState.obstacles.push({x: WORLD_WIDTH, y: 0, w: 50, h: WORLD_HEIGHT}); 
            for(let i=0; i<50; i++) {
                let w = 100 + Math.random() * 150; let h = 100 + Math.random() * 150;
                let x = Math.floor((Math.random() * (WORLD_WIDTH - w))/50)*50; let y = Math.floor((Math.random() * (WORLD_HEIGHT - h))/50)*50;
                let overlap = false; for(let o of gameState.obstacles) { if (x < o.x + o.w && x + w > o.x && y < o.y + o.h && y + h > o.y) overlap = true; }
                if (!overlap) gameState.obstacles.push({x, y, w, h});
            }
            gameState.obstacles.push({x: WORLD_WIDTH/2 - 100, y: WORLD_HEIGHT/2 - 100, w: 200, h: 200});
            for(let i=0; i<100; i++) {
                let type = Math.random() > 0.5 ? 'crack' : 'patch';
                gameState.decorations.push({ x: Math.random() * WORLD_WIDTH, y: Math.random() * WORLD_HEIGHT, type: type, rot: Math.random() * Math.PI * 2, size: 10 + Math.random() * 20 });
            }
        }
 
        function findSafeSpawn() {
            if (gameState.obstacles.length === 0) return {x: 200 + Math.random()*200, y: 200 + Math.random()*200};
            let safe = false; let x, y;
            let attempts = 0;
            while(!safe && attempts < 100) {
                x = 100 + Math.random() * (WORLD_WIDTH - 200); y = 100 + Math.random() * (WORLD_HEIGHT - 200); safe = true;
                for(let obs of gameState.obstacles) { if (x > obs.x - 50 && x < obs.x + obs.w + 50 && y > obs.y - 50 && y < obs.y + obs.h + 50) { safe = false; break; } }
                attempts++;
            }
            return {x, y};
        }
 
        function respawnPlayer() {
            if (!isServer) {
                // Queue the respawn for the next input flush
                gameState.pendingRespawn = { weapon: respawnWeapon, armor: respawnArmor };
                document.getElementById('death-screen').classList.add('hidden');
                gameState.score = 0;
                gameState.cameraLocked = false;
                gameState.nextThresholdIndex = 0;
            } else {
                // Server respawns itself locally
                const old = gameState.player;
                const spawn = findSafeSpawn();
                gameState.player = new Character(old.name, spawn.x, spawn.y, respawnWeapon, respawnArmor, old.color, false, myId);
                gameState.playerId = myId;
                gameState.entities = gameState.entities.filter(e => e.id !== myId);
                gameState.cameraLocked = false;
                gameState.nextThresholdIndex = 0;
                document.getElementById('death-screen').classList.add('hidden');
                gameState.score = 0;
            }
        }
 
        function startGameSession() {
            console.log("🎮 Starting game session...");
            gameState.running = true;
            gameState.lastTime = performance.now();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('death-screen').classList.add('hidden');
            console.log("✅ UI screens hidden, starting game loop");
            requestAnimationFrame(gameLoop);
        }
 
        function gameLoop(time) {
            if (!gameState.running) return;
            let dt = time - gameState.lastTime; gameState.lastTime = time; if (dt > 50) dt = 50;
            if (isServer) updateServer(dt);
            else updateClientView(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }
 
        function updateServer(dt) {
            const player = gameState.player;
            if (!player) return;
            
            if (!player.dead) {
                let input = new Vector(0,0);
                if (gameState.keys.w) input.y = -1;
                if (gameState.keys.s) input.y = 1;
                if (gameState.keys.a) input.x = -1;
                if (gameState.keys.d) input.x = 1;
                if (input.mag() > 0) input = input.normalize();
                player.moveInput = input;
                
                if (gameState.keys.space) { player.performDash(); gameState.keys.space = false; }
                if (gameState.keys.e) { player.throwKnife(); gameState.keys.e = false; }
                if (gameState.keys.r) player.reload();

                // ONLY calculate mouse angle for the HOST player
                let screenX = (player.x - gameState.camera.x) + (CANVAS.width / 2);
                let screenY = (player.y - gameState.camera.y) + (CANVAS.height / 2);
                player.angle = Math.atan2(gameState.mouse.y - screenY, gameState.mouse.x - screenX);
                
                if (gameState.mouse.down) {
                    if (player.weapon.auto || gameState.mouse.clickFrame) player.shoot();
                }
                gameState.mouse.clickFrame = false;
            }
            // ... (keep the rest of the function the same)
            player.update(dt);
 
            gameState.entities.forEach(ent => { if (!ent.dead) ent.update(dt); });
 
            for(let i=gameState.bullets.length-1;    i>=0; i--) { let b=gameState.bullets[i];    b.update(dt); if(b.dead)    gameState.bullets.splice(i,1); }
            for(let i=gameState.projectiles.length-1; i>=0; i--) { let p=gameState.projectiles[i]; p.update(dt); if(p.dead) gameState.projectiles.splice(i,1); }
            for(let i=gameState.particles.length-1;  i>=0; i--) { let p=gameState.particles[i];  p.update(dt); if(p.life<=0) gameState.particles.splice(i,1); }
 
            // Clean up dead non-server players (leave them in list for a moment for death anim)
            gameState.entities = gameState.entities.filter(e => !e.dead || (Date.now() - (e._deadAt || Date.now())) < 3000);
 
            // Camera follows server player
            let mx = (gameState.mouse.x - CANVAS.width/2)*0.4; let my = (gameState.mouse.y - CANVAS.height/2)*0.4;
            let tx = (player.pos.x + mx) - CANVAS.width/2; let ty = (player.pos.y + my) - CANVAS.height/2;
            gameState.camera.x += (tx - gameState.camera.x) * 0.1; gameState.camera.y += (ty - gameState.camera.y) * 0.1;

            checkLevelUp(); updateUI();
 
            
            // Broadcast authoritative state to all clients (Throttled to 20 FPS)
            gameState.syncTimer = (gameState.syncTimer || 0) + dt;
            if (firebaseReady && gameState.syncTimer >= 50) {
                set(fbState(), {
                    entities:    [player.serialize(), ...gameState.entities.map(e => e.serialize())],
                    bullets:     gameState.bullets.map(b => b.serialize()),
                    projectiles: gameState.projectiles.map(p => p.serialize()),
                    particles:   gameState.particles.map(p => p.serialize())
                });
                gameState.syncTimer = 0;
            }
        }

        function updateClientView(dt) {
            // --- BULLETPROOF LERP CODE ---
            // Only run if renderData, targetData, and both entity arrays actually exist
            if (gameState.renderData && gameState.targetData && gameState.renderData.entities && gameState.targetData.entities) {
                
                // Smoothly glide players to their target coordinates
                gameState.renderData.entities.forEach(ent => {
                    let target = gameState.targetData.entities.find(e => e.id === ent.id);
                    if (target) {
                        ent.x += (target.x - ent.x) * 0.3; 
                        ent.y += (target.y - ent.y) * 0.3;
                        
                        // Smoothly rotate weapons
                        let diff = target.a - ent.a;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        ent.a += diff * 0.3;
                        
                        // Instantly copy non-movement stats
                        ent.hp = target.hp; ent.dead = target.dead; ent.rl = target.rl; 
                        ent.camo = target.camo; ent.inv = target.inv; ent.currentAmmo = target.currentAmmo;
                    }
                });
                
                // Add new players or remove disconnected ones
                let currentIds = gameState.renderData.entities.map(e => e.id);
                gameState.targetData.entities.forEach(t => { if (!currentIds.includes(t.id)) gameState.renderData.entities.push({...t}); });
                gameState.renderData.entities = gameState.renderData.entities.filter(ent => gameState.targetData.entities.some(e => e.id === ent.id));
 
                // Bullets and particles move too fast to lerp, just snap them safely
                gameState.renderData.bullets = gameState.targetData.bullets || [];
                gameState.renderData.projectiles = gameState.targetData.projectiles || [];
                gameState.renderData.particles = gameState.targetData.particles || [];
            }
 
            if (gameState.player) {
                // Tie the camera to our smoothly interpolated player
                const p = (gameState.renderData && gameState.renderData.entities) 
                            ? gameState.renderData.entities.find(e => e.id === myId) || gameState.player 
                            : gameState.player;
                
                let mx = (gameState.mouse.x - CANVAS.width/2)*0.4; let my = (gameState.mouse.y - CANVAS.height/2)*0.4;
                let tx = (p.x + mx) - CANVAS.width/2; let ty = (p.y + my) - CANVAS.height/2;
                if (!gameState.cameraLocked) {
                    gameState.camera.x = tx; gameState.camera.y = ty; gameState.cameraLocked = true;
                } else {
                    gameState.camera.x += (tx - gameState.camera.x) * 0.1;
                    gameState.camera.y += (ty - gameState.camera.y) * 0.1;
                }
            }
            checkLevelUp(); updateUI();
        }
 
        function checkLevelUp() {
            if (gameState.player && !gameState.player.dead && gameState.nextThresholdIndex < gameState.perkThresholds.length) {
                let threshold = gameState.perkThresholds[gameState.nextThresholdIndex];
                if (gameState.score >= threshold) { showLevelUpScreen(); gameState.nextThresholdIndex++; }
            }
        }
 
        function showLevelUpScreen() {
            const container = document.getElementById('perk-cards-container'); container.innerHTML = '';
            let currentPerks = gameState.player.perks || [];
            Object.keys(PERKS_LIST).forEach(key => {
                if (currentPerks.includes(key)) return;
                let perk = PERKS_LIST[key]; let card = document.createElement('div'); card.className = 'perk-card';
                card.innerHTML = `<div class="perk-title">${perk.name}</div><div class="perk-desc">${perk.desc}</div>`;
                card.onclick = () => {
                    // Queue the perk choice for the next input flush
                    if (isServer) { gameState.player.perks.push(key); } 
                    else if (firebaseReady) { gameState.pendingPerk = key; }
                    document.getElementById('level-up-screen').classList.add('hidden');
                }; container.appendChild(card);
            });
            document.getElementById('level-up-screen').classList.remove('hidden');
        }
 
        function updateUI() {
            if (gameState.player) {
                const p = gameState.player;
                document.getElementById('score-display').innerText = `Score: ${Math.floor(gameState.score)}`;
                const am = document.getElementById('ammo-display');
                if (p.rl) { am.innerText = "RELOADING"; am.style.color = "#e74c3c"; document.getElementById('reload-msg').style.display = 'block'; } 
                else {
                    let wInfo = p.w ? WEAPONS[p.w] : (p.weapon || WEAPONS.pistol);
                    am.innerText = `${p.currentAmmo !== undefined ? p.currentAmmo : '--'} / ${wInfo.ammo}`; am.style.color = "white"; document.getElementById('reload-msg').style.display = 'none';
                }
                const hp = document.getElementById('health-fill'); hp.style.width = `${(p.hp / p.mhp) * 100}%`;
                if (p.perks && p.perks.includes('dash')) {
                    document.getElementById('dash-bar-container').style.display = 'block';
                    let pct = 100 - (p.dc / 3000 * 100); document.getElementById('dash-fill').style.width = `${pct}%`;
                } else { document.getElementById('dash-bar-container').style.display = 'none'; }
                if (p.perks && p.perks.includes('knife')) {
                    const ic = document.getElementById('ability-icon'); ic.style.display = 'flex';
                    ic.style.borderColor = p.kc <= 0 ? 'white' : '#555'; ic.style.color = p.kc <= 0 ? 'white' : '#555';
                } else { document.getElementById('ability-icon').style.display = 'none'; }
                let list = isServer
                    ? [...gameState.entities, gameState.player].filter(Boolean)
                    : (gameState.renderData?.entities || []);
                let sorted = list.filter(e=>!e.dead).sort((a,b) => (b.sc||0) - (a.sc||0));
                let lb = document.getElementById('leaderboard');
                lb.innerHTML = sorted.slice(0, 5).map((e, i) => `<div class="lb-entry" style="color:${e.id === gameState.playerId ? '#2ecc71' : 'white'}">${i+1}. ${e.n || e.name} - ${Math.floor(e.sc||e.score||0)}</div>`).join('');
            }
        }
 
        function draw() {
            CTX.fillStyle = '#2b2b2b'; CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);
            CTX.save(); CTX.translate(-gameState.camera.x, -gameState.camera.y);
            CTX.strokeStyle = '#383838'; CTX.lineWidth = 1; CTX.beginPath();
            let startX = Math.floor(gameState.camera.x / TILE_SIZE) * TILE_SIZE; let startY = Math.floor(gameState.camera.y / TILE_SIZE) * TILE_SIZE;
            for (let x = startX; x < gameState.camera.x + CANVAS.width + TILE_SIZE; x += TILE_SIZE) { CTX.moveTo(x, gameState.camera.y); CTX.lineTo(x, gameState.camera.y + CANVAS.height); }
            for (let y = startY; y < gameState.camera.y + CANVAS.height + TILE_SIZE; y += TILE_SIZE) { CTX.moveTo(gameState.camera.x, y); CTX.lineTo(gameState.camera.x + CANVAS.width, y); }
            CTX.stroke();
            
            let decorations = gameState.renderData?.decorations || gameState.decorations || [];
            decorations.forEach(d => {
                if(d.x<gameState.camera.x-50||d.x>gameState.camera.x+CANVAS.width+50||d.y<gameState.camera.y-50||d.y>gameState.camera.y+CANVAS.height+50)return;
                CTX.save(); CTX.translate(d.x, d.y); CTX.rotate(d.rot); CTX.fillStyle='#222';
                if(d.type==='crack'){CTX.beginPath();CTX.moveTo(-d.size,0);CTX.lineTo(d.size,0);CTX.moveTo(0,-d.size*0.5);CTX.lineTo(0,d.size*0.5);CTX.strokeStyle='#202020';CTX.lineWidth=2;CTX.stroke();}
                else{CTX.fillRect(-d.size/2,-d.size/2,d.size,d.size);} CTX.restore();
            });
            
            let obstacles = gameState.renderData?.obstacles || gameState.obstacles || [];
            for (let obs of obstacles) {
                if(obs.x+obs.w<gameState.camera.x||obs.x>gameState.camera.x+CANVAS.width||obs.y+obs.h<gameState.camera.y||obs.y>gameState.camera.y+CANVAS.height)continue;
                CTX.fillStyle='#2c3e50';CTX.fillRect(obs.x,obs.y,obs.w,obs.h); CTX.fillStyle='#1a252f';CTX.fillRect(obs.x,obs.y+obs.h-10,obs.w,10);
                CTX.fillStyle='#34495e';CTX.fillRect(obs.x+5,obs.y+5,obs.w-10,obs.h-15); CTX.strokeStyle='#2c3e50';CTX.lineWidth=2;CTX.beginPath();CTX.moveTo(obs.x+5,obs.y+5);CTX.lineTo(obs.x+obs.w-5,obs.y+obs.h-15);CTX.moveTo(obs.x+obs.w-5,obs.y+5);CTX.lineTo(obs.x+5,obs.y+obs.h-15);CTX.stroke();
                CTX.strokeStyle='#1a252f';CTX.lineWidth=2;CTX.strokeRect(obs.x,obs.y,obs.w,obs.h);
            }
            
            let entities = (gameState.renderData ? gameState.renderData.entities : (gameState.player ? [...(gameState.entities || []), gameState.player] : (gameState.entities || []))) || [];
            let bullets = (gameState.renderData ? gameState.renderData.bullets : gameState.bullets) || [];
            let particles = (gameState.renderData ? gameState.renderData.particles : gameState.particles) || [];
            let projectiles = (gameState.renderData ? gameState.renderData.projectiles : gameState.projectiles) || [];
 
            let drawOrder = entities.sort((a,b) => (a.y||a.pos.y) - (b.y||b.pos.y));
            drawOrder.forEach(e => {
                if(e.dead) return;
                if(e instanceof Character) drawCharacter(CTX, e.serialize()); else drawCharacter(CTX, e);
            });
            bullets.forEach(b => {
                let x = b.x !== undefined ? b.x : b.pos.x; let y = b.y !== undefined ? b.y : b.pos.y;
                CTX.beginPath(); CTX.arc(x, y, 4, 0, Math.PI*2); CTX.fillStyle='#fff'; CTX.fill();
            });
            projectiles.forEach(p => {
                let x = p.x !== undefined ? p.x : p.pos.x; let y = p.y !== undefined ? p.y : p.pos.y; let r = p.r !== undefined ? p.r : p.rot;
                CTX.save(); CTX.translate(x, y); CTX.rotate(r); CTX.fillStyle='#bdc3c7'; CTX.beginPath(); CTX.moveTo(10,0); CTX.lineTo(-5,5); CTX.lineTo(-5,-5); CTX.fill(); CTX.restore();
            });
            particles.forEach(p => {
                let x = p.x !== undefined ? p.x : p.pos.x; let y = p.y !== undefined ? p.y : p.pos.y; let l = p.l !== undefined ? p.l : p.life; let c = p.c || p.color; let s = p.s || p.size;
                CTX.globalAlpha = Math.max(0, l); CTX.fillStyle = c; CTX.beginPath(); CTX.arc(x, y, s*l, 0, Math.PI*2); CTX.fill(); CTX.globalAlpha = 1;
            });
            CTX.restore();
        }
 
        let selectedWeapon = 'pistol'; let selectedArmor = 'none'; let selectedColor = '#e74c3c';
        let respawnWeapon = 'pistol'; let respawnArmor = 'none';
 
        document.getElementById('btn-play').onclick = async () => {
            console.log("🎮 Play button clicked");
            if (!firebaseReady) {
                console.error("❌ Firebase not configured");
                alert("Firebase not configured! Fill in FIREBASE_CONFIG at the top of the script.");
                return;
            }
            try {
                const nickname = document.getElementById('nickname').value.trim() || 'Player';
                console.log(`✅ Joining as: ${nickname} with ${selectedWeapon}/${selectedArmor}`);
                await joinPublicServer(nickname, selectedWeapon, selectedArmor, selectedColor);
                console.log("✅ Game session started");
            } catch (e) {
                console.error("❌ Game start failed:", e);
                alert("Failed to start game: " + e.message);
            }
        };
        
        document.getElementById('respawn-btn').onclick = () => {
            respawnPlayer();
        };
        
        window.addEventListener('resize', () => { CANVAS.width = window.innerWidth; CANVAS.height = window.innerHeight; }); window.dispatchEvent(new Event('resize'));
        window.addEventListener('keydown', e => { if(e.key.toLowerCase()=='w') gameState.keys.w=true; if(e.key.toLowerCase()=='a') gameState.keys.a=true; if(e.key.toLowerCase()=='s') gameState.keys.s=true; if(e.key.toLowerCase()=='d') gameState.keys.d=true; if(e.key.toLowerCase()=='r') gameState.keys.r=true; if(e.key==' ') gameState.keys.space=true; if(e.key.toLowerCase()=='e') gameState.keys.e=true; });
        window.addEventListener('keyup', e => { if(e.key.toLowerCase()=='w') gameState.keys.w=false; if(e.key.toLowerCase()=='a') gameState.keys.a=false; if(e.key.toLowerCase()=='s') gameState.keys.s=false; if(e.key.toLowerCase()=='d') gameState.keys.d=false; if(e.key.toLowerCase()=='r') gameState.keys.r=false; if(e.key==' ') gameState.keys.space=false; if(e.key.toLowerCase()=='e') gameState.keys.e=false; });
        window.addEventListener('mousemove', e => { gameState.mouse.x = e.clientX; gameState.mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => { gameState.mouse.down = true; gameState.mouse.clickFrame = true; });
        window.addEventListener('mouseup', () => gameState.mouse.down = false);
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = btn.dataset.color;
            };
        });
        initMenus();
        watchPlayerCount();
    </script>
</body>
